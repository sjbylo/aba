#!/bin/bash
# bundle.conf - Configuration for v2 bundle pipeline
# Edit these values for your environment

BASE_DOM=$(hostname -d)
NTP_IP=10.0.1.8
TEST_HOST=$(hostname -s).$BASE_DOM
