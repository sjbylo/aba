WORK_DIR=$PWD/work
TEMPLATES_DIR=$(cd "$(dirname "${BASH_SOURCE[0]}")/../templates" 2>/dev/null && pwd)
CLOUD_DIR=/nas/redhat/aba-bundles-v2-test

# Cluster settings for test installation
CLUSTER_NAME=bundle-compact
CLUSTER_TYPE=compact
CLUSTER_STARTING_IP=10.0.1.75
CLUSTER_API_VIP=10.0.1.223
CLUSTER_INGRESS_VIP=10.0.1.233
CLUSTER_MEM=32
CLUSTER_CPU=12
CLUSTER_PLATFORM=vmw

# Internal network gateway (used to create a temp default route for pasta hairpin)
GATEWAY_IP=10.0.1.1

# Git branch to install aba from
GIT_BRANCH=${GIT_BRANCH:-dev}
