# This is the KVM/libvirt configuration file used by aba.
# Please go through all values carefully and adjust to your environment!
# Requires passwordless SSH access from this host to the KVM hypervisor.

LIBVIRT_URI=qemu+ssh://kvm-user@kvmhost.lan/system	# Remote libvirt connection URI.
							# The host part (e.g. root@kvmhost.lan) is also
							# used for scp/ssh operations.

KVM_STORAGE_POOL=/var/lib/libvirt/images		# Filesystem path on the KVM host where VM disk
							# images and boot ISOs are stored.

KVM_NETWORK=br-lab					# Bridge name on the KVM host.
							# VMs are attached to this bridge for network access.

